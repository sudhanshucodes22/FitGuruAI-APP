<body class="bg-background flex flex-col min-h-screen">

</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-gutter py-xl w-full">
<!-- Header Branding (Suppressed Nav Shell as per task focused rule) -->
<header class="mb-xl text-center">
<div class="inline-block p-xs rounded-xl bg-primary/5 mb-md">
<span class="font-display-hero text-headline-md tracking-tighter text-primary-fixed-dim">FITGURU</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Ascend Your Limits</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs max-w-sm">The technical engine for elite physical performance.</p>
</header>
<!-- Auth Selection Glass Card -->
<div class="w-full max-w-md glass-container rounded-[2rem] p-lg flex flex-col gap-sm">
<!-- Primary Action: Create Account -->
<button class="group relative w-full h-16 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-xl overflow-hidden transition-all duration-300 hover:scale-[1.02] active:scale-95 flex items-center justify-center px-gutter" style="--mouse-x: 230.46922302246094px; --mouse-y: 28.221435546875px;">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative z-10">CREATE ACCOUNT</span>
</button>
<!-- Secondary Action: Sign In -->
<button class="w-full h-16 glass-container text-on-surface font-headline-md text-headline-md rounded-xl transition-all duration-300 hover:bg-white/5 hover:border-white/20 active:scale-95 flex items-center justify-center px-gutter">
                SIGN IN
            </button>
<!-- Divider -->
<div class="flex items-center gap-sm my-md">
<div class="h-[1px] flex-1 bg-white/10"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Fast Track With</span>
<div class="h-[1px] flex-1 bg-white/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<!-- Apple -->
<button class="flex items-center justify-center gap-sm h-14 rounded-xl glass-container hover:bg-white/5 transition-all group">

</svg>

            </p>

<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-32 bg-primary/10 blur-[120px] rounded-full pointer-events-none opacity-40"></div>
</main>
<!-- Visual Enhancements (Floating Elements) -->
<div class="fixed top-20 right-[10%] opacity-20 pointer-events-none hidden lg:block">
<div class="w-64 h-64 glass-container rounded-full animate-pulse-slow"></div>
</div>
<div class="fixed bottom-20 left-[5%] opacity-10 pointer-events-none hidden lg:block">
<div class="w-96 h-96 border border-primary/20 rounded-full animate-pulse-slow"></div>
</div>
<!-- Interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousemove', (e) => {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                button.style.setProperty('--mouse-x', `${x}px`);
                button.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
<!-- Custom Cursor for that Elite feeling -->
<div class="fixed w-4 h-4 bg-primary-container rounded-full pointer-events-none z-[9999] opacity-0 transition-opacity duration-300 hidden md:block mix-blend-difference" id="custom-cursor" style="left: 372px; top: 401px; opacity: 0;"></div>
<script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.opacity = '1';
        });
        document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    </script>
