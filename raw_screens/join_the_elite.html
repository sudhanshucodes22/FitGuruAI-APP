<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500&amp;family=Geist:wght@500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            overflow-x: hidden;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-glow-border {
            border: 1px solid #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }
        .neon-glow-text {
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#106e00",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container-low": "#1b1b1b",
                        "surface-container": "#1f1f1f",
                        "primary-fixed-dim": "#2ae500",
                        "on-primary-fixed-variant": "#095300",
                        "on-secondary": "#313030",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#2a2a2a",
                        "primary-container": "#39ff14",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-primary": "#053900",
                        "secondary-container": "#474746",
                        "outline": "#85967c",
                        "on-tertiary-container": "#606162",
                        "surface-container-highest": "#353535",
                        "on-surface-variant": "#baccb0",
                        "on-secondary-fixed-variant": "#474746",
                        "on-tertiary-fixed": "#1a1c1c",
                        "inverse-on-surface": "#303030",
                        "surface": "#131313",
                        "surface-dim": "#131313",
                        "on-secondary-container": "#b7b5b4",
                        "surface-variant": "#353535",
                        "outline-variant": "#3c4b35",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "tertiary-fixed": "#e2e2e2",
                        "on-primary-container": "#107100",
                        "on-primary-fixed": "#022100",
                        "background": "#131313",
                        "tertiary-container": "#dddddd",
                        "secondary": "#c8c6c5",
                        "primary": "#efffe3",
                        "on-background": "#e2e2e2",
                        "error": "#ffb4ab",
                        "tertiary": "#f9fafa",
                        "surface-bright": "#393939",
                        "surface-tint": "#2ae500",
                        "on-tertiary": "#2f3131",
                        "on-surface": "#e2e2e2",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#e5e2e1",
                        "inverse-surface": "#e2e2e2",
                        "primary-fixed": "#79ff5b",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-fixed-variant": "#454747"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "16px",
                        "gutter": "20px",
                        "container-max": "1440px",
                        "md": "24px",
                        "xl": "64px",
                        "lg": "40px",
                        "xs": "8px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "display-hero": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Geist"],
                        "mono-data": ["Geist"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "display-hero": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600"}],
                        "mono-data": ["14px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background flex flex-col min-h-screen">
<!-- Atmospheric Background Shader -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-40">

</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-gutter py-xl w-full">
<!-- Header Branding (Suppressed Nav Shell as per task focused rule) -->
<header class="mb-xl text-center">
<div class="inline-block p-xs rounded-xl bg-primary/5 mb-md">
<span class="font-display-hero text-headline-md tracking-tighter text-primary-fixed-dim">FITGURU</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Ascend Your Limits</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs max-w-sm">The technical engine for elite physical performance.</p>
</header>
<!-- Auth Selection Glass Card -->
<div class="w-full max-w-md glass-container rounded-[2rem] p-lg flex flex-col gap-sm">
<form id="auth-form" class="flex flex-col gap-sm">
    <div class="flex flex-col gap-xs">
        <label class="font-mono-data text-[10px] text-on-surface-variant uppercase tracking-wider">Username</label>
        <input id="username" type="text" placeholder="ENTER USERNAME" required class="w-full h-12 px-md bg-white/5 border border-white/10 rounded-xl focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim text-on-surface placeholder-on-surface-variant/40 font-mono-data text-xs transition-all uppercase">
    </div>
    <div class="flex flex-col gap-xs">
        <label class="font-mono-data text-[10px] text-on-surface-variant uppercase tracking-wider">Security Code</label>
        <input id="password" type="password" placeholder="ENTER PASSWORD" required class="w-full h-12 px-md bg-white/5 border border-white/10 rounded-xl focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim text-on-surface placeholder-on-surface-variant/40 font-mono-data text-xs transition-all">
    </div>
    <!-- Actions -->
    <div class="flex flex-col gap-xs mt-md">
        <button id="register-btn" type="button" class="group relative w-full h-14 bg-primary-container text-on-primary-container font-headline-md text-sm rounded-xl overflow-hidden transition-all duration-300 hover:scale-[1.02] active:scale-95 flex items-center justify-center">
            <span class="relative z-10 font-bold uppercase tracking-wider">CREATE ACCOUNT</span>
        </button>
        <button id="login-btn" type="button" class="w-full h-14 glass-container text-on-surface font-headline-md text-sm rounded-xl transition-all duration-300 hover:bg-white/5 hover:border-white/20 active:scale-95 flex items-center justify-center">
            SIGN IN
        </button>
    </div>
</form>
</div>
<!-- Footer Meta Section -->
<footer class="mt-lg text-center max-w-xs">
<p class="font-label-caps text-label-caps text-on-surface-variant/60 leading-relaxed font-body-md">
                By joining, you consent to our <a class="text-primary hover:underline transition-all" href="#">Training Protocols</a> and <a class="text-primary hover:underline transition-all" href="#">Data Encryption Policy</a>.
            </p>
</footer>
<!-- Bottom Ambient Lighting -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-32 bg-primary/10 blur-[120px] rounded-full pointer-events-none opacity-40"></div>
</main>
<!-- Visual Enhancements (Floating Elements) -->
<div class="fixed top-20 right-[10%] opacity-20 pointer-events-none hidden lg:block">
<div class="w-64 h-64 glass-container rounded-full animate-pulse-slow"></div>
</div>
<div class="fixed bottom-20 left-[5%] opacity-10 pointer-events-none hidden lg:block">
<div class="w-96 h-96 border border-primary/20 rounded-full animate-pulse-slow"></div>
</div>
<!-- Interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousemove', (e) => {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                button.style.setProperty('--mouse-x', `${x}px`);
                button.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Register handler
        const registerBtn = document.getElementById('register-btn');
        if (registerBtn) {
            registerBtn.addEventListener('click', async () => {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                if (!username || !password) {
                    showToast("Username & password required", "error");
                    return;
                }
                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        showToast(data.error || "Registration failed", "error");
                    } else {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', data.user.username);
                        showToast("Account Created", "success");
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    }
                } catch (err) {
                    showToast("Connection failed", "error");
                }
            });
        }

        // Login handler
        const loginBtn = document.getElementById('login-btn');
        if (loginBtn) {
            loginBtn.addEventListener('click', async () => {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                if (!username || !password) {
                    showToast("Username & password required", "error");
                    return;
                }
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        showToast(data.error || "Login failed", "error");
                    } else {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('username', data.user.username);
                        showToast("Welcome back!", "success");
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    }
                } catch (err) {
                    showToast("Connection failed", "error");
                }
            });
        }
    </script>
<!-- Custom Cursor for that Elite feeling -->
<div class="fixed w-4 h-4 bg-primary-container rounded-full pointer-events-none z-[9999] opacity-0 transition-opacity duration-300 hidden md:block mix-blend-difference" id="custom-cursor" style="left: 372px; top: 401px; opacity: 0;"></div>
<script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.style.opacity = '1';
        });
        document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    </script>


</body></html>
