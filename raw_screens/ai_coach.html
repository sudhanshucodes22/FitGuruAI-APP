            }
          },
        },
      }

<style>
        body {
            background-color: #000000;
            color: #e2e2e2;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .elite-border {
            border-top: 1px solid #39ff14;
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        .listening-glow {
            border-color: rgba(57, 255, 20, 0.5) !important;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2) !important;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        main.scroll-area {
            padding-bottom: 280px !important;

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md antialiased">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-gutter py-md">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div>
<h1 class="font-display-hero text-headline-md tracking-tighter text-primary-fixed-dim leading-none">FITGURU</h1>
<span class="font-label-caps text-[10px] text-on-surface-variant tracking-[0.2em]">AI COACHING UNIT</span>
</div>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/5 transition-all active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</button>
</header>
<main class="pt-24 pb-48 px-gutter max-w-container-max mx-auto space-y-lg pb-64">
<!-- AI Avatar & Intro -->
<section class="flex flex-col items-center text-center space-y-md relative z-10">
<div class="relative">
<div class="w-32 h-32 rounded-full p-1 bg-gradient-to-tr from-primary/40 to-transparent animate-pulse">
<img class="w-full h-full rounded-full object-cover" data-alt="A highly detailed 3D digital avatar of a futuristic athletic trainer, featuring glowing cybernetic details, short buzz-cut hair, and a sharp focused expression. The background is a dark, tech-inspired training environment with neon green light accents and high-end glass textures. Professional lighting emphasizes the skin texture and metallic elements, creating an elite tech-noir aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCB19t161uaT8feGpCk1WnR1e1CTRl1YnAAGlfex3h0FApwiXIUUD_yRO7o6HKbGli4GMqiub-LsSaQ8rGaHQMOk1HzVG416zGMnP5W0LdcgsNwX7Y4FDxg5Kqcd_FhtGy15AhUTQEyUs-A74czc4MYU0saWl_WjyEFbvBCNgClNShBailjcw_0xGytPmZqeLs0ASNpfEo9f_iRD1gRmt94nz6LxgdYjqeeoUt5lSpDVFmLRRviNdhCNLnekRoohOCwBuo9DYbY3g">
</div>
<div class="absolute bottom-1 right-1 w-6 h-6 bg-primary-container rounded-full border-4 border-background flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-on-primary font-bold">bolt</span>
</div>
</div>
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary" id="coach-title">"Ready to crush your goals today?"</h2>
<p class="text-on-surface-variant max-w-lg mx-auto" id="coach-subtitle">Initializing coach protocol...</p>
</div>
</section>
<!-- Chat Thread Section -->
<section class="w-full relative z-10 flex-grow" id="chat-section">
<div id="chat-messages-container" class="flex flex-col gap-sm p-sm bg-black/40 rounded-2xl border border-white/5 w-full">
    <!-- Messages loaded dynamically -->
</div>
</section>
</main>
<!-- Voice Assistant & Interaction Layer -->
<div class="fixed left-0 w-full z-50" style="bottom: 84px;">
<!-- Chat Interaction Background Blur -->
<div class="bg-background/90 backdrop-blur-2xl border-t border-white/10 px-gutter pt-md pb-xs rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
<!-- Voice Waveform Overlay -->
<div class="flex items-center justify-center gap-1 h-12 mb-sm" id="voice-waves">
<div class="waveform-bar w-1 bg-primary/20 rounded-full" style="animation-delay: 0.1s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary/40 rounded-full" style="animation-delay: 0.2s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary/60 rounded-full" style="animation-delay: 0.3s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary rounded-full neon-glow" style="animation-delay: 0.4s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary/60 rounded-full" style="animation-delay: 0.5s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary/40 rounded-full" style="animation-delay: 0.6s; height: 6px; opacity: 0.3;"></div>
<div class="waveform-bar w-1 bg-primary/20 rounded-full" style="animation-delay: 0.7s; height: 6px; opacity: 0.3;"></div>
</div>
<!-- Input Bar -->
<div class="flex items-center gap-sm mb-md">
<div id="chat-input-container" class="flex-grow glass-card rounded-full px-sm py-2 flex items-center gap-sm transition-all duration-300">
<button id="voice-btn" class="flex items-center justify-center text-on-surface-variant hover:text-primary active:scale-95 transition-transform shrink-0" title="Voice Input">
<span id="mic-icon" class="material-symbols-outlined text-md">mic</span>
</button>
<input id="chat-input" class="bg-transparent border-none focus:ring-0 text-sm text-on-surface w-full placeholder:text-on-surface-variant/50" placeholder="Ask your coach anything..." type="text">
</div>
<button id="send-btn" class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shadow-lg shadow-primary/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
</div>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute top-[40%] -right-[10%] w-[30%] h-[50%] bg-primary/3 blur-[150px] rounded-full"></div>
</div>
<script>
        // Waveform animation
        const bars = document.querySelectorAll('.waveform-bar');
        let isWaveformAnimating = false;
        
        setInterval(() => {
            bars.forEach(bar => {
                if (isWaveformAnimating) {
                    const randomHeight = Math.floor(Math.random() * 26) + 6;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.opacity = '1';
                } else {
                    bar.style.height = '6px';
                    bar.style.opacity = '0.3';
                }
            });
        }, 150);

        const messagesContainer = document.getElementById('chat-messages-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // Scroll helper to push content above bottom nav bar
        function scrollToBottom() {
            setTimeout(() => {
                const scrollArea = document.querySelector('.scroll-area');
                if (scrollArea) {
                    scrollArea.scrollTop = scrollArea.scrollHeight;
                }
            }, 50);
        }

        function appendMessage(sender, text, timestamp = new Date()) {
            const timeStr = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageEl = document.createElement('div');
            
            if (sender === 'user') {
                messageEl.className = 'flex flex-col items-end gap-1 self-end max-w-[85%]';
                messageEl.innerHTML = `
                    <div class="glass-card bg-[#39ff14]/10 border border-[#39ff14]/30 text-white rounded-2xl rounded-tr-none px-md py-sm text-xs font-body-md shadow-[0_0_15px_rgba(57,255,20,0.1)]">
                        ${text}
                    </div>
                    <span class="text-[8px] text-on-surface-variant/40 font-mono-data mr-1">${timeStr}</span>
                `;
            } else {
                messageEl.className = 'flex flex-col items-start gap-1 self-start max-w-[85%]';
                messageEl.innerHTML = `
                    <div class="flex items-center gap-xs mb-0.5">
                        <span class="material-symbols-outlined text-[10px] text-primary" style="font-variation-settings: 'FILL' 1;">psychology</span>
                        <span class="text-[8px] text-primary font-mono-data tracking-wider uppercase">JARVIS_V4</span>
                    </div>
                    <div class="glass-card bg-white/5 border border-white/10 text-on-surface rounded-2xl rounded-tl-none px-md py-sm text-xs font-body-md whitespace-pre-line leading-relaxed">
                        ${text}
                    </div>
                    <span class="text-[8px] text-on-surface-variant/40 font-mono-data ml-1">${timeStr}</span>
                `;
            }
            
            messagesContainer.appendChild(messageEl);
            scrollToBottom();
        }

        function appendTypingIndicator() {
            isWaveformAnimating = true; // Animate waves while coach is thinking
            const typingEl = document.createElement('div');
            typingEl.id = 'typing-indicator';
            typingEl.className = 'flex flex-col items-start gap-1 self-start max-w-[80%]';
            typingEl.innerHTML = `
                <div class="flex items-center gap-xs mb-0.5">
                    <span class="material-symbols-outlined text-[10px] text-primary" style="font-variation-settings: 'FILL' 1;">psychology</span>
                    <span class="text-[8px] text-primary font-mono-data tracking-wider uppercase">JARVIS_V4</span>
                </div>
                <div class="glass-card bg-white/5 border border-white/10 text-on-surface rounded-2xl rounded-tl-none px-md py-sm text-xs font-body-md flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
                    <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-1.5 h-1.5 bg-primary rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                </div>
            `;
            messagesContainer.appendChild(typingEl);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            isWaveformAnimating = false; // Stop waves
            const typingEl = document.getElementById('typing-indicator');
            if (typingEl) typingEl.remove();
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            chatInput.value = '';
            appendMessage('user', text);
            appendTypingIndicator();

            try {
                const res = await fetch('/api/coach/chat', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ message: text })
                });
                
                removeTypingIndicator();
                const data = await res.json();
                
                if (res.ok) {
                    appendMessage('coach', data.text, data.timestamp);
                } else {
                    appendMessage('coach', `// JARVIS // CONNECTION_ERROR: Failed to establish secure uplink. Reason: ${data.error || 'Server error'}`);
                }
            } catch (err) {
                removeTypingIndicator();
                appendMessage('coach', '// JARVIS // OFFLINE: Transmission failed. Check telemetry stream connection.');
            }
        }

        async function initCoach() {
            try {
                // Profile
                const profileRes = await fetch('/api/auth/profile', { headers: getAuthHeaders() });
                if (!profileRes.ok) throw new Error("Unauthorized");
                const profile = await profileRes.json();
                
                document.getElementById('coach-title').textContent = `"Ready to crush your goals today, ${profile.username}?"`;
                document.getElementById('coach-subtitle').textContent = `Neural connection stable. Streak lock: ${profile.streak} Days.`;

                // History
                const historyRes = await fetch('/api/coach/history', { headers: getAuthHeaders() });
                if (historyRes.ok) {
                    const chats = await historyRes.json();
                    messagesContainer.innerHTML = '';
                    if (chats.length === 0) {
                        appendMessage('coach', `Welcome back, ${profile.username}! Ask me anything about your workout protocols, meal macros, or rest cycles.`);
                    } else {
                        chats.forEach(chat => {
                            appendMessage(chat.sender, chat.text, chat.timestamp);
                        });
                    }
                    scrollToBottom();
                }
            } catch (err) {
                console.error("Coach initialization failed:", err);
                localStorage.removeItem('token');
                window.location.href = 'auth.html';
            }
        }

        // Web Speech API Voice Recognizer
        const voiceBtn = document.getElementById('voice-btn');
        const micIcon = document.getElementById('mic-icon');
        const chatInputContainer = document.getElementById('chat-input-container');
        let speechRecognitionInstance = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognitionInstance = new SpeechRecognition();
            speechRecognitionInstance.continuous = false;
            speechRecognitionInstance.interimResults = false;
            speechRecognitionInstance.lang = 'en-IN'; // Optimized for Indian accent/Hinglish transcribing to English

            speechRecognitionInstance.onstart = () => {
                isListening = true;
                isWaveformAnimating = true;
                micIcon.textContent = 'settings_voice';
                micIcon.classList.add('text-primary', 'animate-pulse');
                if (chatInputContainer) {
                    chatInputContainer.classList.add('listening-glow');
                }
                chatInput.placeholder = 'Listening... Speak now.';
                showToast("COACH VOICE UPLINK ACTIVE");
            };

            speechRecognitionInstance.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                chatInput.value = speechResult;
                showToast("SPEECH ACQUIRED");
                // Submit message after 600ms
                setTimeout(() => {
                    sendMessage();
                }, 600);
            };

            speechRecognitionInstance.onerror = (event) => {
                console.error("Speech link error:", event.error);
                let friendlyMsg = `VOICE ERROR: ${event.error.toUpperCase()}`;
                if (event.error === 'not-allowed') {
                    friendlyMsg = "MIC ACCESS BLOCKED. PLEASE ENABLE MICROPHONE IN BROWSER.";
                } else if (event.error === 'no-speech') {
                    friendlyMsg = "NO SPEECH DETECTED. TRANSMISSION TIMED OUT.";
                } else if (event.error === 'audio-capture') {
                    friendlyMsg = "HARDWARE FAILURE: NO MICROPHONE FOUND.";
                }
                showToast(friendlyMsg, "error");
                stopListeningState();
            };

            speechRecognitionInstance.onend = () => {
                stopListeningState();
            };

            function stopListeningState() {
                isListening = false;
                isWaveformAnimating = false;
                micIcon.textContent = 'mic';
                micIcon.classList.remove('text-primary', 'animate-pulse');
                if (chatInputContainer) {
                    chatInputContainer.classList.remove('listening-glow');
                }
                chatInput.placeholder = 'Ask your coach anything...';
            }

            voiceBtn.addEventListener('click', () => {
                if (isListening) {
                    speechRecognitionInstance.stop();
                } else {
                    speechRecognitionInstance.start();
                }
            });
        } else {
            voiceBtn.addEventListener('click', () => {
                showToast("VOICE INPUT NOT SUPPORTED BY SYSTEM", "error");
            });
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.addEventListener('DOMContentLoaded', () => {
            initCoach();
        });
    </script>
</body></html>
